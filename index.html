<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Idea Saver</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --accent: #f0e040;
      --accent2: #ff6b35;
      --text: #f0eff4;
      --muted: #6e6d78;
      --border: #2a2a32;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    .idea-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 99px;
      font-weight: 500;
    }

    /* INPUT AREA */
    .input-section {
      padding: 20px;
    }

    .input-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
    }

    .tag-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tag-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .tag-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: none;
      min-height: 90px;
    }

    textarea::placeholder { color: var(--muted); }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .char-count { color: var(--muted); font-size: 0.75rem; }

    .save-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 99px;
      padding: 8px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.3px;
    }

    .save-btn:active { transform: scale(0.95); }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* FILTER */
    .filter-row {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .filter-chip {
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* SEARCH */
    .search-wrap {
      padding: 0 20px 16px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 10px 16px 10px 38px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 34px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* IDEAS LIST */
    .ideas-list {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .idea-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: slideIn 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .idea-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .idea-card[data-tag="💡 General"]::before { background: var(--accent); }
    .idea-card[data-tag="🚀 Project"]::before { background: #4ecdc4; }
    .idea-card[data-tag="🎨 Creative"]::before { background: var(--accent2); }
    .idea-card[data-tag="📚 Learn"]::before { background: #a78bfa; }
    .idea-card[data-tag="💼 Work"]::before { background: #34d399; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-tag {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .card-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .card-btn:hover { color: var(--text); background: var(--surface2); }
    .card-btn.delete:hover { color: #ff6b6b; }
    .card-btn.pin-active { color: var(--accent); }

    .card-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    .card-text.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expand-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
      padding: 0;
    }

    .card-date {
      margin-top: 10px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* PINNED SECTION */
    .section-label {
      padding: 4px 20px 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <header>
    <h1>Idea<span>Vault</span></h1>
    <span class="idea-count" id="countBadge">0 ideas</span>
  </header>

  <!-- INPUT -->
  <div class="input-section">
    <div class="input-box">
      <div class="tag-row" id="tagRow"></div>
      <textarea id="ideaInput" placeholder="Drop an idea here..." maxlength="500"></textarea>
      <div class="input-footer">
        <span class="char-count"><span id="charCount">0</span>/500</span>
        <button class="save-btn" id="saveBtn" disabled>Save Idea</button>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search ideas..." />
  </div>

  <!-- FILTER -->
  <div class="filter-row" id="filterRow"></div>

  <!-- IDEAS -->
  <div id="ideasContainer"></div>

  <div class="toast" id="toast"></div>

  <script>
    const TAGS = ['💡 General','🚀 Project','🎨 Creative','📚 Learn','💼 Work'];
    let ideas = JSON.parse(localStorage.getItem('ideaVault') || '[]');
    let selectedTag = TAGS[0];
    let filterTag = 'All';
    let searchQuery = '';

    // --- TAG BUTTONS ---
    const tagRow = document.getElementById('tagRow');
    TAGS.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn' + (tag === selectedTag ? ' active' : '');
      btn.textContent = tag;
      btn.onclick = () => {
        selectedTag = tag;
        tagRow.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
      tagRow.appendChild(btn);
    });

    // --- FILTER CHIPS ---
    const filterRow = document.getElementById('filterRow');
    ['All', ...TAGS].forEach(tag => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (tag === 'All' ? ' active' : '');
      chip.textContent = tag;
      chip.onclick = () => {
        filterTag = tag;
        filterRow.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        render();
      };
      filterRow.appendChild(chip);
    });

    // --- INPUT ---
    const input = document.getElementById('ideaInput');
    const saveBtn = document.getElementById('saveBtn');
    const charCount = document.getElementById('charCount');

    input.addEventListener('input', () => {
      charCount.textContent = input.value.length;
      saveBtn.disabled = input.value.trim() === '';
    });

    saveBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      const idea = {
        id: Date.now(),
        text,
        tag: selectedTag,
        pinned: false,
        date: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      };
      ideas.unshift(idea);
      save();
      input.value = '';
      charCount.textContent = '0';
      saveBtn.disabled = true;
      showToast('✅ Idea saved!');
      render();
    });

    // --- SEARCH ---
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      render();
    });

    // --- SAVE ---
    function save() {
      localStorage.setItem('ideaVault', JSON.stringify(ideas));
    }

    // --- TOAST ---
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // --- RENDER ---
    function render() {
      const container = document.getElementById('ideasContainer');
      container.innerHTML = '';

      let filtered = ideas.filter(i => {
        const matchTag = filterTag === 'All' || i.tag === filterTag;
        const matchSearch = i.text.toLowerCase().includes(searchQuery) || i.tag.toLowerCase().includes(searchQuery);
        return matchTag && matchSearch;
      });

      document.getElementById('countBadge').textContent = `${ideas.length} idea${ideas.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="emoji">🌌</div><p>No ideas yet.<br>Drop your first one above!</p></div>`;
        return;
      }

      const pinned = filtered.filter(i => i.pinned);
      const rest = filtered.filter(i => !i.pinned);

      if (pinned.length) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = '📌 Pinned';
        container.appendChild(label);
        pinned.forEach(idea => container.appendChild(makeCard(idea)));
      }

      if (rest.length) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = pinned.length ? 'Recent' : 'All Ideas';
        container.appendChild(label);
        rest.forEach(idea => container.appendChild(makeCard(idea)));
      }
    }

    function makeCard(idea) {
      const card = document.createElement('div');
      card.className = 'idea-card';
      card.setAttribute('data-tag', idea.tag);

      const isLong = idea.text.length > 160;
      let expanded = false;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-tag">${idea.tag}</span>
          <div class="card-actions">
            <button class="card-btn pin-btn ${idea.pinned ? 'pin-active' : ''}" title="Pin">📌</button>
            <button class="card-btn copy-btn" title="Copy">📋</button>
            <button class="card-btn delete delete-btn" title="Delete">🗑</button>
          </div>
        </div>
        <div class="card-text ${isLong ? 'collapsed' : ''}">${escHtml(idea.text)}</div>
        ${isLong ? '<button class="expand-btn">Show more</button>' : ''}
        <div class="card-date">${idea.date}</div>
      `;

      // Pin
      card.querySelector('.pin-btn').onclick = () => {
        idea.pinned = !idea.pinned;
        save();
        showToast(idea.pinned ? '📌 Pinned!' : 'Unpinned');
        render();
      };

      // Copy
      card.querySelector('.copy-btn').onclick = () => {
        navigator.clipboard?.writeText(idea.text).then(() => showToast('📋 Copied!'));
      };

      // Delete
      card.querySelector('.delete-btn').onclick = () => {
        ideas = ideas.filter(i => i.id !== idea.id);
        save();
        showToast('🗑 Deleted');
        render();
      };

      // Expand
      if (isLong) {
        const expandBtn = card.querySelector('.expand-btn');
        const textEl = card.querySelector('.card-text');
        expandBtn.onclick = () => {
          expanded = !expanded;
          textEl.classList.toggle('collapsed', !expanded);
          expandBtn.textContent = expanded ? 'Show less' : 'Show more';
        };
      }

      return card;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    render();
  </script>
</body>
</html>
